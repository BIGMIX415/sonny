<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07130f">
  <title>Jerry Mixon Jr. | The Next Chapter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">JM</span>
      <span class="brand-copy">The Next Chapter</span>
    </div>
    <div class="top-actions">
      <button class="sound-button" id="soundButton" type="button" aria-pressed="false" aria-label="Play original hip-hop instrumental">
        <span class="sound-bars" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
        <span id="soundLabel">Play the beat</span>
      </button>
      <button class="icon-button" id="fullscreenButton" type="button" aria-label="Enter fullscreen">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3H3v5M16 3h5v5M8 21H3v-5m13 5h5v-5"/></svg>
      </button>
    </div>
  </header>

  <main class="experience">
    <section class="book-stage" aria-label="Jerry Mixon Jr. graduation flipbook">
      <button class="nav-button nav-prev" id="prevButton" type="button" aria-label="Previous page">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <article class="book" id="book" aria-live="polite"></article>
      <button class="nav-button nav-next" id="nextButton" type="button" aria-label="Next page">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </section>

    <footer class="chapter-nav">
      <div class="progress-meta">
        <span id="pageNumber">01 / 12</span>
        <span id="chapterName">The Next Chapter</span>
      </div>
      <div class="progress-track" id="progressTrack" role="progressbar" aria-valuemin="1" aria-valuemax="12" aria-valuenow="1">
        <span id="progressFill"></span>
      </div>
      <div class="hint">Swipe or use arrow keys</div>
    </footer>
  </main>

  <script src="script.js?v=2"></script>
</body>
</html>
